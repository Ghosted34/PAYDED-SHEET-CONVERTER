<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading…</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Barlow:wght@300;400&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #0a1628;
        --navy2: #0f2044;
        --gold: #c9a84c;
        --gold2: #e8c96a;
        --white: #f0eeea;
        --muted: #7a8fa8;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        -webkit-app-region: drag;
      }

      .shell {
        width: 100%;
        height: 100%;
        background: linear-gradient(
          160deg,
          var(--navy2) 0%,
          var(--navy) 60%,
          #060e1c 100%
        );
        border-radius: 14px;
        border: 1px solid rgba(201, 168, 76, 0.25);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        position: relative;
        overflow: hidden;
      }

      /* subtle corner accent lines */
      .shell::before,
      .shell::after {
        content: "";
        position: absolute;
        width: 60px;
        height: 60px;
        border-color: rgba(201, 168, 76, 0.3);
        border-style: solid;
      }
      .shell::before {
        top: 12px;
        left: 12px;
        border-width: 1px 0 0 1px;
      }
      .shell::after {
        bottom: 12px;
        right: 12px;
        border-width: 0 1px 1px 0;
      }

      /* logo */
      .logo-wrap {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.08);
        border: 1.5px solid rgba(201, 168, 76, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        animation: fadeUp 0.6s ease both;
      }
      .logo-wrap img {
        width: 68px;
        height: 68px;
        object-fit: contain;
        filter: drop-shadow(0 2px 8px rgba(201, 168, 76, 0.4));
      }

      /* placeholder shown when img fails */
      .logo-placeholder {
        width: 68px;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.4rem;
        filter: drop-shadow(0 2px 8px rgba(201, 168, 76, 0.4));
      }

      /* title block */
      .title {
        font-family: "Cinzel", serif;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: var(--gold2);
        text-align: center;
        line-height: 1.5;
        animation: fadeUp 0.6s 0.1s ease both;
        margin-bottom: 4px;
      }
      .subtitle {
        font-family: "Barlow", sans-serif;
        font-size: 0.7rem;
        font-weight: 300;
        letter-spacing: 0.22em;
        color: var(--muted);
        text-transform: uppercase;
        text-align: center;
        animation: fadeUp 0.6s 0.2s ease both;
        margin-bottom: 28px;
      }

      /* divider */
      .divider {
        width: 40px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin-bottom: 28px;
        animation: fadeUp 0.6s 0.25s ease both;
      }

      /* spinner */
      .spinner-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        animation: fadeUp 0.6s 0.35s ease both;
      }

      .ring {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(201, 168, 76, 0.15);
        border-top-color: var(--gold);
        animation: spin 0.9s linear infinite;
      }

      .status {
        font-family: "Barlow", sans-serif;
        font-size: 0.65rem;
        font-weight: 400;
        letter-spacing: 0.14em;
        color: var(--muted);
        text-transform: uppercase;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="logo-wrap">
        <!-- swap src for the real crest PNG when available -->
        <img
          src="./logo.png"
          alt="Nigerian Navy Crest"
          onerror="
            this.style.display = 'none';
            this.nextElementSibling.style.display = 'flex';
          "
        />
        <div class="logo-placeholder" style="display: none">⚓</div>
      </div>

      <div class="title">NIGERIAN NAVY</div>
      <div class="subtitle">PayHead Converter</div>

      <div class="divider"></div>

      <div class="spinner-wrap">
        <div class="ring"></div>
        <div class="status">Starting service…</div>
      </div>
    </div>
  </body>
</html>
